repos:
  - repo: local
    hooks:
      # 🛠 Run autopep8 to fix formatting
      - id: autopep8
        name: AutoPEP8 Fixer
        entry: autopep8 --in-place --aggressive --aggressive -r .
        language: system
        pass_filenames: false
        stages: [commit]

      # 🛠 Remove unused imports and variables with autoflake
      - id: autoflake
        name: Autoflake Cleaner
        entry: autoflake --in-place --remove-unused-variables --remove-all-unused-imports -r .
        language: system
        pass_filenames: false
        stages: [commit]

      # 🛠 Format code with Black
      - id: black
        name: Black Formatter
        entry: black --line-length 79 .
        language: system
        pass_filenames: false
        stages: [commit]

      # ✅ Run tests and check coverage before committing
      - id: coverage
        name: Coverage Test
        entry: sh -c "coverage run -m pytest && coverage report --fail-under=80"
        language: system
        pass_filenames: false
        stages: [commit]